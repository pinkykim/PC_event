<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>타자 연습 게임</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #6e7681;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #e3b341;
      --blue: #58a6ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .wrap {
      width: 100%;
      max-width: 740px;
    }

    .game-title {
      text-align: center;
      font-size: 1.75rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .game-subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 32px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
    }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Nickname screen ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .text-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .text-input:focus { border-color: var(--blue); }

    .err {
      font-size: 0.83rem;
      color: var(--red);
      margin-top: 6px;
      min-height: 1.2em;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:active:not(:disabled) { transform: scale(0.985); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-blue  { background: var(--blue);  color: #0d1117; }
    .btn-green { background: var(--green); color: #0d1117; }
    .btn-blue:hover:not(:disabled)  { opacity: 0.85; }
    .btn-green:hover:not(:disabled) { opacity: 0.85; }

    /* ── Game screen ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 10px;
      text-align: center;
    }
    .stat-label { font-size: 0.73rem; color: var(--muted); margin-bottom: 3px; }
    .stat-value {
      font-size: 1.65rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }
    .stat-unit  { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .typed-preview {
  margin-bottom: 14px;
  padding: 12px;
  min-height: 120px;

  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;

  white-space: pre-wrap;
  word-break: break-word;

  line-height: 1.7;
  font-size: 1rem;
  color: white;
}

    /* Target text */
    .target-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 16px;
      font-size: 1.15rem;
      line-height: 1.9;
      word-break: break-all;
      user-select: none;
      margin-bottom: 12px;
      min-height: 70px;
    }
    .c-correct  { color: var(--green); }
    .c-wrong    { color: var(--red); background: rgba(248,81,73,.13); border-radius: 2px; }
    .c-cursor   { color: #fff; border-bottom: 2px solid var(--blue); }
    .c-pending  { color: var(--muted); }

    /* Progress */
    .progress-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 2px;
      transition: width 0.1s;
      width: 0%;
    }

    /* Typing input */
    .type-input {
      width: 100%;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 14px;

      overflow-y: hidden;
white-space: pre-wrap;
word-break: break-word;
    }
    .type-input:focus         { border-color: var(--blue); }
    .type-input.state-done   { border-color: var(--green); }
    .type-input.state-wrong  { border-color: var(--red); }

    .hint {
      text-align: center;
      font-size: 0.83rem;
      color: var(--muted);
      margin-bottom: 14px;
      min-height: 1.2em;
    }
    .hint.warn  { color: var(--yellow); }
    .hint.done  { color: var(--green);  font-weight: 600; }

    /* ── Result screen ── */
    .result-hero {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .result-hero .big-score {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--blue);
      line-height: 1;
    }
    .result-hero .score-label { font-size: 0.9rem; color: var(--muted); margin-top: 4px; }
    .result-mini {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

  </style>
</head>
<body>
<div class="wrap">
  <div class="game-title">⌨️ 픽사 PC 이벤트 </div>
  <p class="game-subtitle">피의 쉴드로 아기자기를 지켜주세요.</p>

  <!-- ════════════════════════════════ 닉네임 화면 -->
  <div id="screen-nick" class="screen active">
    <div class="card">
      <div class="field">
        <label for="nick-input">트위터 아이디를 입력하세요. 아이디는 영어, 숫자, _(언더바)만 입력할 수 있습니다.</label>
        <input type="text" id="nick-input" class="text-input"
               placeholder="@아이디" maxlength="20" autocomplete="off">
        <div class="err" id="nick-err"></div>
      </div>
      <button class="btn btn-blue" id="btn-start">게임 시작</button>
    </div>
  </div>

  <!-- ════════════════════════════════ 게임 화면 -->
  <div id="screen-game" class="screen">
    <div class="card">
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-label">정확도</div>
          <div class="stat-value" id="st-acc">–</div>
          <div class="stat-unit">%</div>
        </div>
        <div class="stat">
          <div class="stat-label">현재 타수</div>
          <div class="stat-value" id="st-spd">–</div>
          <div class="stat-unit">타/분</div>
        </div>
        <div class="stat">
          <div class="stat-label">경과 시간</div>
          <div class="stat-value" id="st-sec">0</div>
          <div class="stat-unit">초</div>
        </div>
      </div>

      <div class="target-box" id="target-box"></div>

      <div class="progress-wrap">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

     <input type="text" id="type-input" class="type-input"
       placeholder="여기에 타이핑하세요…"
       autocomplete="off"
       autocorrect="off"
       autocapitalize="off"
       spellcheck="false">

       <div class="typed-preview" id="typed-preview"></div>

      <div class="hint" id="hint-msg"></div>

      <button class="btn btn-green" id="btn-submit" disabled>제출하기 ✓</button>
    </div>
  </div>

  <!-- ════════════════════════════════ 결과 화면 -->
  <div id="screen-result" class="screen">
    <div class="card">
      <div class="result-hero">
        <div class="result-user" id="res-nick"></div>
        <div class="big-score" id="res-score">0</div>
        <div class="score-label">타/분 (최종 타수)</div>
        <div class="result-mini">
          <div class="stat">
            <div class="stat-label">완성 시간</div>
            <div class="stat-value" id="res-sec">–</div>
            <div class="stat-unit">초</div>
          </div>
          <div class="stat">
            <div class="stat-label">정확도</div>
            <div class="stat-value" style="color:var(--green)">100</div>
            <div class="stat-unit">%</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════╗
// ║  🔧 연습 문장을 아래에서 수정하세요                       ║
// ╚══════════════════════════════════════════════════════╝
const TARGET_TEXT = "자포자기: 지금 공식 입장도 안 나온 상태인데 어떻게 핵을 썼다고 단정할 수 있는지 그 심오한 논리를 전혀 이해 못 하겠음. 그리고 아기자기님은 핵 안 써도 근딜 잘함. 대가리 있으면 솔직히 생각해 봐라. 핵 쓰는 놈이 닌자를 하겠냐? 너 같은 허접이랑 게임 하는 거 재미없다고 굳이 닌자를 하면서 밸런스 맞춰주는 애한테 뭔 소리임. 그리고 실버랑 골드 가봤냐? 무간지옥이 따로 없다. 사람이 할 말 못 할 말 구분을 하고 살아야지. 막 뱉는다고 다 말 아니다. 인성 까는 건 솔직히 뭐라고 안 하는데 실력은 까지 마라. 개빡치니까. 신격화? 너도 실버에서 극방 탱커 5번만 하면 바로 아기자기 신당 세워서 대대로 모실 듯^^";
// ══════════════════════════════════════════════════════════

const STORAGE_KEY = "typing_game_v1";

// ─── 🔧 Apps Script 배포 URL을 여기에 붙여넣으세요
const SHEET_URL = "https://script.google.com/macros/s/AKfycbyl3cgkOIF4Lq960KhMdo9y0th2QA0GP9khPpiRkE_Up-uG41gmlxlH7v_RIzJB8jldng/exec";

// ─── Elements
const screenNick   = document.getElementById("screen-nick");
const screenGame   = document.getElementById("screen-game");
const screenResult = document.getElementById("screen-result");
const nickInput    = document.getElementById("nick-input");
const nickErr      = document.getElementById("nick-err");
const btnStart     = document.getElementById("btn-start");
const targetBox    = document.getElementById("target-box");
const typeInput    = document.getElementById("type-input");
const stAcc        = document.getElementById("st-acc");
const stSpd        = document.getElementById("st-spd");
const stSec        = document.getElementById("st-sec");
const progressFill = document.getElementById("progress-fill");
const hintMsg      = document.getElementById("hint-msg");
const btnSubmit    = document.getElementById("btn-submit");
const typedPreview = document.getElementById("typed-preview");

// ─── State
let nickname = "";
let startTime = null;
let timerID   = null;
let elapsed   = 0;   // seconds
let started   = false;

// ─── Storage
function loadData() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { attempted: [] };
  } catch { return { attempted: [] }; }
}
function saveData(d) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
}

function show(screen) {
  [screenNick, screenGame, screenResult].forEach(s => s.classList.remove("active"));
  screen.classList.add("active");
}

// ─── Render target text
function renderText(typed) {
  const chars = TARGET_TEXT;
  let html = "";
  for (let i = 0; i < chars.length; i++) {
    const ch = chars[i] === " " ? "&nbsp;" : chars[i];
    if (i < typed.length) {
      html += typed[i] === chars[i]
        ? `<span class="c-correct">${ch}</span>`
        : `<span class="c-wrong">${ch}</span>`;
    } else if (i === typed.length) {
      html += `<span class="c-cursor">${ch}</span>`;
    } else {
      html += `<span class="c-pending">${ch}</span>`;
    }
  }
  targetBox.innerHTML = html;
}

// ─── Stats
function getStats(typed) {
  const len = typed.length;
  if (!len) return { acc: 100, spd: 0, progress: 0, done: false };
  let correct = 0;
  for (let i = 0; i < len; i++) {
    if (typed[i] === TARGET_TEXT[i]) correct++;
  }
  const acc      = Math.round((correct / len) * 100);
  const spd      = elapsed > 0 ? Math.round((len / elapsed) * 60) : 0;
  const progress = Math.min(Math.round((len / TARGET_TEXT.length) * 100), 100);
  const done     = typed === TARGET_TEXT;
  return { acc, spd, progress, done };
}

// ─── Timer tick
function tick() {
  elapsed = Math.round((Date.now() - startTime) / 1000);
  stSec.textContent = elapsed;
  const typed = typeInput.value;
  if (typed.length && elapsed > 0) {
    stSpd.textContent = Math.round((typed.length / elapsed) * 60);
  }
}

// ─── Nickname screen
typeInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault(); // Enter 기본 동작 차단

    if (!btnSubmit.disabled) {
      btnSubmit.click();
    }
  }
});

nickInput.addEventListener("input", () => {
  nickInput.value = nickInput.value.replace(/[^A-Za-z0-9_@]/g, "");
});

nickInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    btnStart.click();
  }
});

btnStart.addEventListener("click", () => {
  const nick = nickInput.value.trim();
  if (!nick) { nickErr.textContent = "아이디를 입력해 주세요. "; return; }


  const data = loadData();
  if (data.attempted.includes(nick)) {
    nickErr.textContent = "이미 참여한 아이디입니다. 한 번만 시도할 수 있습니다.";
    return;
  }

  // Mark as attempted right away (prevent multiple tries)
  data.attempted.push(nick);
  saveData(data);

  nickname = nick;
  nickErr.textContent = "";

  // Reset game state
  typeInput.value = "";
  typedPreview.textContent = "";
  typeInput.style.height = "90px";
  typeInput.className = "type-input";
  stAcc.textContent = "–";
  stSpd.textContent = "–";
  stSec.textContent = "0";
  progressFill.style.width = "0%";
  hintMsg.textContent = "";
  hintMsg.className = "hint";
  btnSubmit.disabled = true;
  started = false;
  elapsed = 0;
  if (timerID) clearInterval(timerID);

  renderText("");
  show(screenGame);
  setTimeout(() => typeInput.focus(), 80);
});

// ─── Typing input
typeInput.addEventListener("paste", e => e.preventDefault()); // no pasting

function autoResize() {
  typeInput.style.height = "auto";
  typeInput.style.height = typeInput.scrollHeight + "px";
}

typeInput.addEventListener("input", autoResize);

typeInput.addEventListener("input", () => {
  const typed = typeInput.value;

  typedPreview.textContent = typed;

  // Clamp to target length
  if (typed.length > TARGET_TEXT.length) {
    typeInput.value = typed.slice(0, TARGET_TEXT.length);
    return;
  }

  // Start timer on first key
  if (!started && typed.length > 0) {
    started = true;
    startTime = Date.now();
    timerID = setInterval(tick, 200);
  }

  renderText(typed);
  const { acc, spd, progress, done } = getStats(typed);

  stAcc.textContent = acc;
  stSpd.textContent = elapsed > 0 ? spd : (typed.length ? "…" : "–");
  progressFill.style.width = progress + "%";

  if (done) {
    clearInterval(timerID);
    elapsed = Math.round((Date.now() - startTime) / 1000) || 1;
    stSec.textContent = elapsed;
    stSpd.textContent = Math.round((TARGET_TEXT.length / elapsed) * 60);
    typeInput.classList.add("state-done");
    btnSubmit.disabled = false;
    hintMsg.textContent = "완성! 엔터 또는 제출 버튼을 눌러 답글을 등록하세요 ✓";
    hintMsg.className = "hint done";
  } else {
    typeInput.classList.remove("state-done");
    btnSubmit.disabled = true;
    if (typed.length > 0 && acc < 100) {
      typeInput.classList.add("state-wrong");
      hintMsg.textContent = "틀린 글자가 있어요. 100% 정확도여야 제출할 수 있습니다.";
      hintMsg.className = "hint warn";
    } else {
      typeInput.classList.remove("state-wrong");
      hintMsg.textContent = "";
      hintMsg.className = "hint";
    }
  }
});

// ─── Enter to submit
typeInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !btnSubmit.disabled) btnSubmit.click();
});

// ─── Submit
btnSubmit.addEventListener("click", () => {
  if (typeInput.value !== TARGET_TEXT) return;

  const finalElapsed = elapsed || 1;
  const finalScore   = Math.round((TARGET_TEXT.length / finalElapsed) * 60);

  document.getElementById("res-score").textContent = finalScore;
  document.getElementById("res-sec").textContent   = finalElapsed;
  document.getElementById("res-nick").textContent = nickname;

  // 구글 시트에 기록
  if (SHEET_URL !== "여기에_URL_붙여넣기") {
    fetch(SHEET_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nickname, score: finalScore, elapsed: finalElapsed })
    });
  }

  show(screenResult);
});

// ─── Init
renderText("");
</script>
</body>
</html>
